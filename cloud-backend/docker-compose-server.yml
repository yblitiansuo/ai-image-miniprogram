version: '3.8'

services:
  backend:
    build: .
    container_name: ai_image_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - MYSQL_HOST=${MYSQL_HOST:-your-mysql-host}
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DB:-ai_image}
      - MYSQL_USER=${MYSQL_USER:-ai_image}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - ARK_API_KEY=${ARK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEV_MODE=false
      - BACKEND_PORT=9999
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://your-domain.com,http://127.0.0.1:9999}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - COS_BUCKET=${COS_BUCKET:-your-cos-bucket}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
    depends_on:
      - mysql
      - redis
    networks:
      - ai_image_net

networks:
  ai_image_net:
    driver: bridge
