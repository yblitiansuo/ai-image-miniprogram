version: '3.8'

services:
  backend:
    build: .
    container_name: ai_image_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9999:9999"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=${MYSQL_DB:-ai_image}
      - MYSQL_USER=${MYSQL_USER:-ai_image}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ai_image123}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - ARK_API_KEY=${ARK_API_KEY:-your-ark-api-key}
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret}
      - DEV_MODE=false
      - BACKEND_PORT=9999
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-https://your-domain.com,http://127.0.0.1:9999}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - COS_BUCKET=${COS_BUCKET:-your-cos-bucket}
      - COS_SECRET_ID=${COS_SECRET_ID:-your-cos-secret-id}
      - COS_SECRET_KEY=${COS_SECRET_KEY:-your-cos-secret-key}
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - ai_image_net

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DB:-ai_image}
      MYSQL_USER: ${MYSQL_USER:-ai_image}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ai_image123}
    networks:
      - ai_image_net
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: redis_db
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    networks:
      - ai_image_net
    volumes:
      - redis_data:/data

networks:
  ai_image_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
