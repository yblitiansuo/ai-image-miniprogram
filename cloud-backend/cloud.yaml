# 微信云托管部署配置（内存队列模式）
# 参考：https://github.com/Wechat-Group/WxRuntimeCloud
#
# 使用说明：
# 1. 先申请企业小程序、腾讯云 COS、火山引擎 API Key
# 2. 填写环境变量（见 services 中的 env 配置）
#    - REDIS_URL 留空（使用内存队列）
#    - CELERY_BROKER=memory://
#    - CELERY_BACKEND=cache+memory://
# 3. 构建镜像：docker build -t ai-image-backend .
# 4. 推送镜像：docker push ccr.ccs.tencentyun.com/your-namespace/ai-image:latest
# 5. 更新 image 地址并部署

name: ai-image-generator

services:
  # Web 服务 - FastAPI 主应用
  - name: web
    image: ccr.ccs.tencentyun.com/your-namespace/ai-image:latest
    env:
      - MYSQL_HOST
      - MYSQL_PORT
      - MYSQL_DB
      - MYSQL_USER
      - MYSQL_PASSWORD
      - CELERY_BROKER
      - CELERY_BACKEND
      - ARK_API_KEY
      - ARK_API_URL
      - SEEDREAM_MODEL
      - SEEDREAM_SIZE
      - COS_REGION
      - COS_BUCKET
      - COS_SECRET_ID
      - COS_SECRET_KEY
      - JWT_SECRET
      - WECHAT_APPID
      - WECHAT_SECRET
      - DEV_MODE
      - BACKEND_PORT
      - CORS_ALLOW_ORIGINS
    port: 9999
    resources:
      cpu: 1
      memory: 2048
    volumeMounts:
      - name: temp
        mountPath: /tmp
    replicas: 2  # Web 多副本，提高可用性

  # Worker 服务 - Celery 异步任务
  - name: worker
    image: ccr.ccs.tencentyun.com/your-namespace/ai-image:latest
    command: celery -A tasks worker --loglevel=info --pool=solo --concurrency=1
    env:
      - MYSQL_HOST
      - MYSQL_PORT
      - MYSQL_DB
      - MYSQL_USER
      - MYSQL_PASSWORD
      - CELERY_BROKER
      - CELERY_BACKEND
      - ARK_API_KEY
      - ARK_API_URL
      - SEEDREAM_MODEL
      - SEEDREAM_SIZE
      - COS_REGION
      - COS_BUCKET
      - COS_SECRET_ID
      - COS_SECRET_KEY
      - JWT_SECRET
      - TASK_TIMEOUT_SECONDS
      - TASK_MAX_RETRIES
      - TASK_RETRY_DELAY
    resources:
      cpu: 1
      memory: 2048
    replicas: 1

  # Beat 服务 - Celery 定时任务
  - name: beat
    image: ccr.ccs.tencentyun.com/your-namespace/ai-image:latest
    command: celery -A tasks beat --loglevel=info
    env:
      - MYSQL_HOST
      - MYSQL_PORT
      - MYSQL_DB
      - MYSQL_USER
      - MYSQL_PASSWORD
      - CELERY_BROKER
      - CELERY_BACKEND
      - ARK_API_KEY
      - ARK_API_URL
      - SEEDREAM_MODEL
      - SEEDREAM_SIZE
      - COS_REGION
      - COS_BUCKET
      - COS_SECRET_ID
      - COS_SECRET_KEY
      - JWT_SECRET
      - RESULT_RETENTION_DAYS
    resources:
      cpu: 0.5
      memory: 512
    replicas: 1

# 共享存储配置（临时目录，容器重启会丢失）
volumes:
  - name: temp
    mountPath: /tmp
