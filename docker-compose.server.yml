services:
  mysql:
    image: mysql:8.0
    container_name: ai_image_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB:-ai_image}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai_image_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  web:
    build:
      context: ./cloud-backend
    container_name: ai_image_web
    restart: unless-stopped
    env_file:
      - ./cloud-backend/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MYSQL_HOST: mysql
    ports:
      - "127.0.0.1:${BACKEND_PORT:-9999}:9999"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./cloud-backend
    container_name: ai_image_worker
    restart: unless-stopped
    env_file:
      - ./cloud-backend/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MYSQL_HOST: mysql
    command: celery -A tasks worker --loglevel=info --pool=solo --concurrency=1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./cloud-backend
    container_name: ai_image_beat
    restart: unless-stopped
    env_file:
      - ./cloud-backend/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MYSQL_HOST: mysql
    command: celery -A tasks beat --loglevel=info
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
